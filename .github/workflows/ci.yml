# .github/workflows/ci.yml
name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 0"

env:
  NODE_VERSION: "20"

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./my-react-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
     #Node setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./my-react-app/package-lock.json"

       # Install dependencies with caching
      - name: Install dependencies
        run: npm ci

      # Linting (ESLint)
      - name: Run linting
        run: npm run lint

      # Unit Tests (Vitest)
      - name: Run Unit Tests
        run: npm run test

      # Install Browsers for Playwright
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # Run E2E Tests (Playwright)
      - name: Run Playwright E2E Tests
        run: npx playwright test

      # Upload Playwright Report (debugging)
      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: my-react-app/playwright-report/
          retention-days: 7

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ./my-react-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "./my-react-app/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: my-react-app/dist/

      # 5. STEP: Deploy to Vercel (after successful build)
